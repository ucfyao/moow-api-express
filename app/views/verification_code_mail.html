<!DOCTYPE html>
<html style="margin: 0; padding: 0" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Verification Code</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f0f0f0; font-family: Ubuntu, sans-serif">
    <table
      style="
        border-collapse: collapse;
        table-layout: fixed;
        min-width: 320px;
        width: 100%;
        background-color: #f0f0f0;
      "
      cellpadding="0"
      cellspacing="0"
    >
      <tbody>
        <tr>
          <td>
            <div style="height: 20px"></div>
            <div
              style="
                margin: 0 auto;
                max-width: 600px;
                min-width: 320px;
                background-color: #ffffff;
                padding: 40px 20px;
              "
            >
              <h1
                style="
                  margin-top: 0;
                  margin-bottom: 0;
                  color: #565656;
                  font-size: 30px;
                  line-height: 38px;
                  text-align: center;
                "
              >
                <strong><%= siteName %></strong>
              </h1>
              <p style="margin-top: 20px; color: #787778; font-size: 16px; line-height: 24px">
                Hi <strong><%= displayName %></strong>, you are changing your password. Please use
                the verification code below within 5 minutes:
              </p>
              <div
                style="
                  margin: 30px auto;
                  text-align: center;
                  background-color: #f5f5f5;
                  padding: 20px;
                  border-radius: 8px;
                  max-width: 300px;
                "
              >
                <span
                  style="
                    font-size: 36px;
                    font-weight: bold;
                    letter-spacing: 8px;
                    color: #448aff;
                    font-family: monospace;
                  "
                  ><%= code %></span
                >
              </div>
              <p style="color: grey; font-size: 14px; line-height: 22px">
                If you did not request this change, please ignore this email and your password will
                remain unchanged.
              </p>
              <div style="padding-top: 30px; padding-bottom: 20px">
                <p
                  style="
                    margin-top: 0;
                    color: #677483;
                    font-size: 14px;
                    line-height: 25px;
                    margin-bottom: 0;
                  "
                >
                  <em style="color: #a9b7c8; font-style: italic"><%= siteName %> team</em>
                  <br />
                  <a href="<%= siteUrl %>"><%= siteUrl %></a>
                </p>
              </div>
            </div>
            <div style="height: 40px"></div>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
